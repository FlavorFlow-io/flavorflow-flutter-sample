name: flavorflow_flutter_sample
description: "Official FlavorFlow Flutter reference: a single, client-agnostic app branded at build time from an injected branding.json."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # FlavorFlow injects the active client's branding.json + logo here at build
  # time. The directory is declared (not individual files) so the app loads
  # whatever logo the brand ships without any source change.
  assets:
    - assets/branding/
